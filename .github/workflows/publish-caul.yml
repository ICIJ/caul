name: "Publish Caul"

on:
  push:
    tags:
      # Publish on any tag starting with a `v`, e.g., v0.1.0
      - caul-v*

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Build Caul
        run: |
          cd caul
          uv build
      - name: Publish Caul
        run: |
          cd caul
          uv publish