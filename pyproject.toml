[project]
name = "caul"
version = "0.1.0"
description = "Python implementation of an ASR service"
requires-python = "<=3.10.19, >=3.10.0"
dependencies = [
    "nemo-toolkit[asr]",
    "torch",
    "numpy",
    "torchaudio>=2.9.1",
]
[build-system]
requires = ["uv_build >= 0.9.22, <0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "torchaudio>=2.9.1",
    "torchcodec>=0.9.1",
]
